tier: 3
model:
  backbone: tf_efficientnetv2_s.in21k_ft_in1k
cbam:
  reduction: 16
  kernel_size: 7
input:
  img_size: 384
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]
augment:
  hflip: 0.5
  vflip: 0.5
  rotation_deg: 15
  color_jitter:
    brightness: 0.10
    contrast:   0.10
    saturation: 0.05
    hue:        0.02
optim:
  lr_backbone:  1.0e-4
  lr_head:      1.0e-3
  weight_decay: 1.0e-4
schedule:
  type: cosine_with_warmup
  warmup_epochs: 1
train:
  batch_size: 16
  num_workers: 8
  epochs: 20
  early_stop_patience: 3
  amp: true
val:
  fraction_of_honest_train: 0.15
  random_state: 0
seeds: [1, 2, 3, 4, 5]
protocols: [provided, honest]
data:
  root: data/raw/400X
  magnification: 400
